# Isolated PostgreSQL instances for demo external systems.
# Start with:
#   docker compose -f docker/docker-compose.external-sources.yml up -d

services:
  mes-postgres:
    image: postgres:16-alpine
    container_name: manufoundry-source-mes-postgres
    environment:
      POSTGRES_USER: mf_mes_admin
      POSTGRES_PASSWORD: source_admin_123
      POSTGRES_DB: mf_mes_execution
    ports:
      - "15432:5432"
    volumes:
      - source_mes_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mf_mes_admin -d mf_mes_execution"]
      interval: 5s
      timeout: 5s
      retries: 10

  erp-postgres:
    image: postgres:16-alpine
